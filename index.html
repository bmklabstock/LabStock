
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabStock Pro</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f8;
}

header{
background:#1f2937;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

input,button,select{
padding:8px;
margin:4px;
}

button{
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#e5e7eb;
}

.expired{
background:#f87171;
color:white;
}

.warning{
background:#fde68a;
}

#scanner{
width:100%;
max-width:400px;
margin-top:10px;
}

.hidden{
display:none;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

</head>

<body>

<header>LabStock Pro</header>

<div class="container">

<div id="login">
<h3>Login</h3>
<select id="role">
<option value="operator">Operador</option>
<option value="admin">Admin</option>
</select>

<input type="password" id="password" placeholder="Contraseña admin">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<h3>Agregar producto</h3>

<input id="nombre" placeholder="Nombre">
<input id="catalogo" placeholder="Catálogo / Código">
<input id="lote" placeholder="Lote">
<input id="vencimiento" type="date">
<input id="temp" placeholder="Temperatura">
<input id="obs" placeholder="Observaciones">

<button onclick="agregar()">Agregar</button>

<h3>Escanear código</h3>

<button onclick="iniciarScanner()">Iniciar cámara</button>

<div id="scanner"></div>

<h3>Buscar</h3>

<input id="buscar" placeholder="Buscar cualquier dato..." oninput="render()">

<h3>Stock</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Catálogo</th>
<th>Lote</th>
<th>Vencimiento</th>
<th>Temp</th>
<th>Obs</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<h3>Historial</h3>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Acción</th>
<th>Producto</th>
</tr>
</thead>

<tbody id="historial"></tbody>
</table>

</div>

</div>

<script>

let stock = JSON.parse(localStorage.getItem("labstock_stock") || "[]")
let historial = JSON.parse(localStorage.getItem("labstock_historial") || "[]")
let userRole = "operator"

function guardar(){
localStorage.setItem("labstock_stock", JSON.stringify(stock))
localStorage.setItem("labstock_historial", JSON.stringify(historial))
}

function login(){

const role = document.getElementById("role").value
const pass = document.getElementById("password").value

if(role==="admin" && pass!=="admin123"){
alert("Contraseña incorrecta")
return
}

userRole = role

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

render()

}

function agregar(){

const item={
nombre:document.getElementById("nombre").value,
catalogo:document.getElementById("catalogo").value,
lote:document.getElementById("lote").value,
vencimiento:document.getElementById("vencimiento").value,
temp:document.getElementById("temp").value,
obs:document.getElementById("obs").value
}

stock.push(item)

historial.unshift({
fecha:new Date().toLocaleString(),
accion:"ALTA",
producto:item.nombre
})

guardar()
render()

}

function eliminar(i){

if(userRole!=="admin"){
alert("Solo admin puede eliminar")
return
}

historial.unshift({
fecha:new Date().toLocaleString(),
accion:"BAJA",
producto:stock[i].nombre
})

stock.splice(i,1)
guardar()
render()

}

function normalizar(t){
return (t||"").toLowerCase()
.normalize("NFD")
.replace(/\p{Diacritic}/gu,"")
}

function render(){

const q = normalizar(document.getElementById("buscar").value)

const tabla=document.getElementById("tabla")
tabla.innerHTML=""

stock
.filter(item=>{

const texto = normalizar(
item.nombre+" "+
item.catalogo+" "+
item.lote+" "+
item.vencimiento+" "+
item.temp+" "+
item.obs
)

return texto.includes(q)

})
.forEach((item,i)=>{

const tr=document.createElement("tr")

if(item.vencimiento){

const v=new Date(item.vencimiento)
const hoy=new Date()

const diff=(v-hoy)/(1000*60*60*24)

if(diff<0) tr.classList.add("expired")
else if(diff<30) tr.classList.add("warning")

}

tr.innerHTML=`
<td>${item.nombre}</td>
<td>${item.catalogo}</td>
<td>${item.lote}</td>
<td>${item.vencimiento}</td>
<td>${item.temp}</td>
<td>${item.obs}</td>
<td>
<button onclick="eliminar(${i})">Eliminar</button>
</td>
`

tabla.appendChild(tr)

})

renderHistorial()

}

function renderHistorial(){

const t=document.getElementById("historial")
t.innerHTML=""

historial.slice(0,50).forEach(h=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${h.fecha}</td>
<td>${h.accion}</td>
<td>${h.producto}</td>
`

t.appendChild(tr)

})

}

function iniciarScanner(){

Quagga.init({
inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector("#scanner")
},
decoder:{
readers:["code_128_reader","ean_reader","ean_8_reader"]
}
},function(err){

if(err){
console.log(err)
return
}

Quagga.start()

})

Quagga.onDetected(function(data){

const code=data.codeResult.code
document.getElementById("catalogo").value=code

Quagga.stop()

})

}

render()

</script>

</body>
</html>
